[general]
import = ["/home/joe/.config/alacritty/themes/everforest-dark.toml"]
# shell = "/bin/tmux"
[terminal]
# program = "/bin/zsh"
shell = "/bin/zsh"

[window]
blur = true
opacity = 0.5


[font]
# /usr/share/fonts/TTF/JetBrainsMonoNerdFont-Regular.ttf
normal.family = "0xProto Nerd Font"

[cursor.style]
	shape = "Beam"
	blinking = "On"

[cursor]
	blink_interval = 500
	blink_timeout = 10

